name: Build Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: lavochkaa/libXray
          path: libXray

      - uses: actions/checkout@v4
        with:
          repository: XXcipherX/Xray-core
          ref: xhttp-session-id-format
          path: Xray-core

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Tidy modules
        run: go mod tidy
        working-directory: libXray

      - name: Build xcframework
        run: python3 build/main.py apple go local
        working-directory: libXray

      - name: Replace xcframework
        run: |
          rm -rf swift/All/LibXray.xcframework
          cp -r libXray/LibXray.xcframework swift/All/LibXray.xcframework

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Install deps
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Install ldid
        run: brew install ldid

      - name: Sign binaries with entitlements
        run: |
          APP=build/ios/iphoneos/Runner.app
          ldid -Sios/Runner/Runner.entitlements "$APP/Runner"
          ldid -Sios/tunnel/tunnel.entitlements "$APP/PlugIns/tunnel.appex/tunnel"

      - name: Package TIPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r OneXray-unsigned.tipa Payload/

      - name: Upload TIPA
        uses: actions/upload-artifact@v4
        with:
          name: OneXray-unsigned-tipa
          path: OneXray-unsigned.tipa
          retention-days: 30
