name: Build Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: lavochkaa/libXray
          path: libXray

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init
        working-directory: libXray

      - name: Tidy modules
        run: go mod tidy
        working-directory: libXray

      - name: Build xcframework
        run: python3 build/main.py apple gomobile
        working-directory: libXray

      - name: Replace xcframework
        run: |
          rm -rf swift/All/LibXray.xcframework
          cp -r libXray/LibXray.xcframework swift/All/LibXray.xcframework

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Install deps
        run: flutter pub get

      - name: Install CocoaPods
        run: pod install
        working-directory: ios

      - name: Patch device_info_plus
        run: python3 -c "import glob,os; [open(f,'w').write(open(f).read().replace('processInfo.isiOSAppOnVision','NO')) for f in glob.glob(os.path.expanduser('~/.pub-cache/**/FPPDeviceInfoPlusPlugin.m'),recursive=True)]"

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r OneXray-patched.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: OneXray-patched-ipa
          path: OneXray-patched.ipa
          retention-days: 7
