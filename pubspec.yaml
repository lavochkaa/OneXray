name: onexray
description: "Cross Platform Xray-core Client"
publish_to: "none"
version: 26.5.1+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  #---------- flutter.dev plugin
  cupertino_icons: ^1.0.9
  path_provider: ^2.1.5
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  quick_actions: ^1.1.0
  go_router: ^17.2.3
  image_picker: ^1.2.2
  process: ^5.0.5

  #---------- dart.dev plugin
  # core
  path: ^1.9.1
  collection: ^1.19.1
  crypto: ^3.0.7
  # i18n
  intl: ^0.20.2
  # async
  async: ^2.13.1
  # native
  ffi: ^2.2.0

  #---------- google.dev plugin
  json_annotation: ^4.11.0
  tuple: ^2.0.2
  firebase_core: ^4.7.0
  firebase_analytics: ^12.3.0
  firebase_crashlytics: ^5.2.0
  google_mobile_ads: ^8.0.0

  #---------- flutter community
  package_info_plus: ^9.0.1
  device_info_plus: ^12.4.0
  share_plus: ^12.0.2

  #---------- third party plugin
  drift: ^2.33.0
  drift_flutter: ^0.3.0
  sqlite3: ^3.3.1

  dio: ^5.9.2
  uuid: ^4.5.3
  permission_handler: ^12.0.1
  app_links: ^7.0.0
  # qrcode
  file_picker: ^11.0.2
  mobile_scanner: ^7.2.0
  image: ^4.8.0
  zxing2: ^0.2.4
  # export
  archive: ^4.0.9
  # state management
  flutter_bloc: ^9.1.1
  flex_seed_scheme: ^4.0.1
  # markdown
  flutter_markdown_plus: ^1.0.7
  duration: ^4.0.3

  flutter_local_notifications: ^21.0.0

  in_app_review: ^2.0.11

  isolate_manager: ^6.3.2

  # desktop
  tray_manager: ^0.5.2
  window_manager: ^0.5.1
  win32: ^5.15.0

dev_dependencies:
  build_runner: ^2.15.0
  json_serializable: ^6.13.2
  drift_dev: ^2.33.0
  pigeon: ^26.3.4
  flutter_lints: ^6.0.0
  flutter_gen_runner: ^5.14.1
  ffigen: ^20.1.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/
    - assets/dat/
    - assets/icon/
    - assets/md/
    - assets/app_icon/

ffigen:
  llvm-path:
    - "C:\Program Files\LLVM"
  output: "lib/core/ffi/generated_bindings.dart"
  headers:
    entry-points:
      - "c/include/libXray.h"
