name: onexray
description: "Cross Platform Xray-core Client"
publish_to: "none"
version: 26.6.1+1

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  #---------- flutter.dev plugin
  cupertino_icons: ^1.0.9
  path_provider: ^2.1.5
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  quick_actions: ^1.1.0
  go_router: ^17.3.0
  image_picker: ^1.2.2
  process: ^5.0.5

  #---------- dart.dev plugin
  # core
  path: ^1.9.1
  collection: ^1.19.1
  crypto: ^3.0.7
  # i18n
  intl: ^0.20.2
  # async
  async: ^2.13.1
  # native
  ffi: ^2.2.0

  #---------- google.dev plugin
  json_annotation: ^4.12.0
  tuple: ^2.0.2
  firebase_core: ^4.10.0
  firebase_analytics: ^12.4.2
  firebase_crashlytics: ^5.2.3
  google_mobile_ads: ^8.0.0

  #---------- flutter community
  package_info_plus: ^10.1.0
  device_info_plus: ^13.1.0
  share_plus: ^13.1.0

  #---------- third party plugin
  drift: ^2.33.0
  drift_flutter: ^0.3.0
  sqlite3: ^3.3.2

  dio: ^5.9.2
  uuid: ^4.5.3
  permission_handler: ^12.0.3
  app_links: ^7.1.1
  # qrcode
  file_picker: ^12.0.0-beta.5
  mobile_scanner: ^7.2.0
  image: ^4.8.0
  zxing2: ^0.2.4
  # export
  archive: ^4.0.9
  # state management
  flutter_bloc: ^9.1.1
  flex_seed_scheme: ^4.0.1
  # markdown
  flutter_markdown_plus: ^1.0.7
  duration: ^4.0.3

  flutter_local_notifications: ^21.0.0

  in_app_review: ^2.0.12

  isolate_manager: ^6.3.2


dev_dependencies:
  build_runner: ^2.15.0
  json_serializable: ^6.14.0
  drift_dev: ^2.33.0
  pigeon: ^26.3.4
  flutter_lints: ^6.0.0
  flutter_gen_runner: ^5.14.1
  ffigen: ^20.1.1

flutter_gen:
  output: lib/gen/

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/
    - assets/dat/
    - assets/icon/
    - assets/md/
    - assets/app_icon/

